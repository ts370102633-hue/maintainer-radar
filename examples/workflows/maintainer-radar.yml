name: Maintainer Radar

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ts370102633-hue/maintainer-radar@v0.1.5
        with:
          output-dir: maintainer-radar-report
          artifact-name: maintainer-radar-report
          private: "false"
